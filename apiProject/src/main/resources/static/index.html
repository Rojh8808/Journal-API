<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Journal App - REST Client</title>

    <!-- External Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- External Stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <!-- Header -->
        <header>
            <div class="brand">
                <div class="brand-icon">
                    <i class="fa-solid fa-book-bookmark"></i>
                </div>
                <div>
                    <h1 class="brand-title">Journal App</h1>
                    <p class="brand-subtitle">Spring Boot & MongoDB Client</p>
                </div>
            </div>

            <div class="api-bar">
                <span class="status-indicator">
                    <span id="statusDot" class="status-dot"></span>
                    <span id="statusText">Connecting</span>
                </span>
                <input type="text" id="apiUrl" value="http://localhost:8080/journal" placeholder="API Endpoint">
                <button class="btn btn-secondary btn-sm" onclick="loadJournals()" title="Refresh">
                    <i class="fa-solid fa-rotate"></i>
                </button>
            </div>
        </header>

        <!-- Main Layout -->
        <main class="main-layout">
            
            <!-- Form Panel -->
            <section class="card">
                <div class="card-header">
                    <h2 id="formTitle" class="card-title">
                        <i class="fa-solid fa-pen-to-square"></i> New Entry
                    </h2>
                </div>

                <form id="journalForm" onsubmit="handleFormSubmit(event)">
                    <input type="hidden" id="journalId">

                    <div class="form-group">
                        <label for="title">Title</label>
                        <input type="text" id="title" class="form-control" placeholder="Entry title..." required>
                    </div>

                    <div class="form-group">
                        <label for="content">Content</label>
                        <textarea id="content" class="form-control" placeholder="Write journal details..." required></textarea>
                    </div>

                    <div class="btn-group">
                        <button type="submit" id="submitBtn" class="btn btn-primary">
                            <i class="fa-solid fa-plus"></i> Save Entry
                        </button>
                        <button type="button" id="cancelBtn" class="btn btn-secondary" onclick="resetForm()" style="display: none;">
                            Cancel
                        </button>
                    </div>
                </form>
            </section>

            <!-- Feed Panel -->
            <section class="card">
                <div class="card-header">
                    <h2 class="card-title">
                        <i class="fa-solid fa-layer-group"></i> Journal Entries
                    </h2>
                    <span id="entryCount" style="color: var(--text-muted); font-size: 0.85rem;">0 entries</span>
                </div>

                <div class="feed-search">
                    <input type="text" id="searchBox" class="form-control" placeholder="Search entries..." oninput="filterJournals()">
                </div>

                <div id="journalFeed" class="entry-list">
                    <div class="empty-state">
                        <i class="fa-solid fa-spinner fa-spin"></i>
                        <p>Loading entries...</p>
                    </div>
                </div>
            </section>

        </main>
    </div>

    <!-- Toast Notifications -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- Delete Confirmation Modal -->
    <div id="deleteModal" class="modal-backdrop">
        <div class="modal-card">
            <i class="fa-solid fa-trash-can" style="font-size: 2rem; color: var(--danger); margin-bottom: 0.75rem;"></i>
            <h4>Delete Journal Entry?</h4>
            <p>Are you sure you want to delete this entry? This action cannot be undone.</p>
            <div class="btn-group">
                <button class="btn btn-secondary" onclick="closeDeleteModal()">Cancel</button>
                <button class="btn btn-danger" onclick="confirmDelete()">Delete</button>
            </div>
        </div>
    </div>

    <!-- Application Script -->
    <script src="app.js"></script>
</body>
</html>
